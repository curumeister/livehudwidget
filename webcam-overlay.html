<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webcam Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: transparent !important;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

.overlay {
  position: relative;
  width: 640px;
  height: 360px;
  border: 3px solid #ff7a00;
  box-shadow: 0 0 12px rgba(255, 122, 0, 0.4);
}

/* Glow interno sutil */
.overlay .border-inner {
  position: absolute;
  top: 6px; left: 6px; right: 6px; bottom: 6px;
  box-shadow:
    inset 0 0 12px rgba(255, 122, 0, 0.2),
    inset 0 0 3px rgba(255, 122, 0, 0.1);
  z-index: 3;
  pointer-events: none;
}

/* Barra inferior única (centralizada) */
.info-bar {
  position: absolute;
  bottom: 8px;
  left: 12px;
  right: 12px;
  height: 48px;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  background: rgba(20, 20, 20, 0.65);
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  color: white;
  letter-spacing: 1px;
}

/* Cada mensagem ocupa o mesmo espaço, com transição */
.info-bar .message {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  opacity: 0;
  transition: opacity 0.5s ease;
  white-space: nowrap;
}

.info-bar .message.active {
  opacity: 1;
}

/* Canal */
.info-bar .channel {
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
}

.info-bar .channel em {
  font-style: italic;
  font-weight: 400;
  margin: 0 8px;
}

/* "curumeister" com gradiente estático */
.info-bar .channel-highlight {
  background: linear-gradient(135deg, #ff7a00, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Cupom */
.info-bar .coupon-message {
  font-weight: 700;
  white-space: nowrap;
  color: white;
}

.info-bar .coupon-message .coupon-text {
  color: white;
  -webkit-text-fill-color: white;
}

/* "CURU" em itálico e com brilho verde */
.info-bar .coupon-message .cupom-highlight {
  font-style: italic;   /* itálico */
  color: #BFFF00;
  -webkit-text-fill-color: #BFFF00;
  text-shadow: 0 0 4px #BFFF00;
  animation: pulsarVerde 2s ease-in-out infinite alternate;
  will-change: text-shadow;
}

/* "TRADEIT.GG" em azul neon */
.info-bar .coupon-message .tradeit-highlight {
  color: #00BFFF;   /* azul neon */
  -webkit-text-fill-color: #00BFFF;
  font-weight: 700;
  text-shadow: 0 0 4px #00BFFF;   /* brilho azul */
}

@keyframes pulsarVerde {
  0% { text-shadow: 0 0 4px #BFFF00; }
  100% { text-shadow: 0 0 12px #BFFF00, 0 0 20px #BFFF00; }
}
</style>
</head>
<body>
  <div class="overlay">
    <!-- Glow interno -->
    <div class="border-inner"></div>

    <!-- Barra inferior única com duas mensagens -->
    <div class="info-bar">
      <!-- Mensagem 1: Canal -->
      <div class="message active" id="channelMessage">
        <span class="channel">
          opiordocs <em>by</em> <span class="channel-highlight">curumeister</span>
        </span>
      </div>
      <!-- Mensagem 2: Cupom -->
      <div class="message" id="couponMessage">
        <span class="coupon-message">
          <span class="coupon-text">cupom: </span>
          <span class="cupom-highlight">CURU</span>
          <span class="coupon-text"> na </span>
          <span class="tradeit-highlight">TRADEIT.GG</span>
        </span>
      </div>
    </div>
  </div>

  <script>
    const channelMsg = document.getElementById('channelMessage');
    const couponMsg = document.getElementById('couponMessage');

    const CUPOM_VISIBLE = 15000;   // 15 segundos mostrando cupom
    const CHANNEL_VISIBLE = 45000; // 45 segundos mostrando canal

    let cupomActive = false;

    function showCupom() {
      if (cupomActive) return;
      cupomActive = true;
      channelMsg.classList.remove('active');
      couponMsg.classList.add('active');
      setTimeout(() => {
        couponMsg.classList.remove('active');
        channelMsg.classList.add('active');
        cupomActive = false;
      }, CUPOM_VISIBLE);
    }

    // Inicia mostrando o canal; a cada 1 minuto alterna
    setInterval(showCupom, CHANNEL_VISIBLE + CUPOM_VISIBLE);
  </script>
</body>
</html>
