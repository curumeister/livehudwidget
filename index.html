<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body {
  margin:0;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* ===== WIDGET COMPACTO ===== */
.widget {
  width:300px;
  height:80px;
  border-radius:18px;
  padding:12px 14px;

  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background: rgba(15,15,15,0.55);
  backdrop-filter: blur(10px);

  isolation:isolate;
}

/* ===== BORDA GRADIENT ===== */
.widget::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1.5px;

  background: linear-gradient(
    135deg,
    #ff7a00,
    #ff3c3c,
    #a855f7,
    #3b82f6,
    #ff7a00
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
}

.widget::after {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:20px;
  background: linear-gradient(
    135deg,
    rgba(255,120,0,0.4),
    rgba(255,60,60,0.4),
    rgba(168,85,247,0.4)
  );
  filter: blur(12px);
  opacity:0.5;
  z-index:-1;
}

.col { width:48%; position:relative; height:100%; }

.divider {
  width:1px;
  height:50%;
  background:rgba(255,255,255,0.06);
}

.stack {
  position:relative;
  height:100%;
  overflow:hidden;
}

.item {
  position:absolute;
  width:100%;
  left:0;
  top:10px;
  opacity:0;
  transition: top 0.7s cubic-bezier(.22,.61,.36,1), opacity 0.5s ease;
}

.item.active {
  top:0;
  opacity:1;
}

.label {
  font-size:10px;
  color:rgba(255,255,255,0.45);
}

.value {
  font-size:18px;
  font-weight:600;
  color:#fff;
}
</style>
</head>

<body>

<div class="widget">

  <!-- CLIMA -->
  <div class="col">
    <div class="stack">
      <div class="item active" id="wA">
        <div class="label">Clima</div>
        <div class="value">--°C</div>
      </div>
      <div class="item" id="wB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- MERCADO -->
  <div class="col">
    <div class="stack">
      <div class="item active" id="mA">
        <div class="label">USD</div>
        <div class="value">R$ --</div>
      </div>
      <div class="item" id="mB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

</div>

<script>
const API_KEY = "46f49c9551bea5305c63071f37f9622d";

const formatBRL = n =>
  n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

/* WEATHER */
let weatherData = [];
let wi = 0;
let wToggle = true;

async function fetchWeather(){
  const cities = [
    { id: 3448439 }, // São Paulo
    { id: 3470127 }, // Rio
    { id: 3451190 }, // BH
    { id: 3450554 }  // Salvador
  ];

  const res = await Promise.all(
    cities.map(c =>
      fetch(`https://api.openweathermap.org/data/2.5/weather?id=${c.id}&units=metric&appid=${API_KEY}`)
        .then(r=>r.json())
    )
  );

  weatherData = res.map(r => ({
    label: r.name,
    value: `${Math.round(r.main.temp)}°C`
  }));
}

/* MARKET */
let marketData = [];
let mi = 0;
let mToggle = true;

async function fetchMarket(){
  try {
    const fiat = await fetch("https://api.exchangerate.host/latest?base=BRL&symbols=USD,GBP")
      .then(r=>r.json());

    const cryptoSymbols = {
      ETH: "ETHBRL",
      MATIC: "MATICBRL"
    };

    const crypto = await Promise.all(
      Object.entries(cryptoSymbols).map(async ([label, symbol]) => {
        try {
          const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`).then(r=>r.json());
          return { label, value: formatBRL(+r.price) };
        } catch {
          return { label, value: "R$ --" };
        }
      })
    );

    marketData = [
      { label: "USD", value: formatBRL(1 / fiat.rates.USD) },
      { label: "GBP", value: formatBRL(1 / fiat.rates.GBP) },
      ...crypto
    ];
  } catch {
    marketData = [
      { label: "USD", value: "R$ --" },
      { label: "GBP", value: "R$ --" }
    ];
  }
}

/* SWAP */
function swapWeather(){
  if(!weatherData.length) return;

  wi = (wi+1)%weatherData.length;
  const next = weatherData[wi];

  const A=document.getElementById("wA");
  const B=document.getElementById("wB");

  const active = wToggle?A:B;
  const nextEl = wToggle?B:A;

  nextEl.querySelector(".label").textContent = next.label;
  nextEl.querySelector(".value").textContent = next.value;

  nextEl.classList.add("active");
  active.classList.remove("active");

  wToggle=!wToggle;
}

function swapMarket(){
  if(!marketData.length) return;

  mi = (mi+1)%marketData.length;
  const next = marketData[mi];

  const A=document.getElementById("mA");
  const B=document.getElementById("mB");

  const active = mToggle?A:B;
  const nextEl = mToggle?B:A;

  nextEl.querySelector(".label").textContent = next.label;
  nextEl.querySelector(".value").textContent = next.value;

  nextEl.classList.add("active");
  active.classList.remove("active");

  mToggle=!mToggle;
}

/* INIT */
async function init(){
  await fetchWeather();
  await fetchMarket();
}

init();

setInterval(fetchWeather, 900000);
setInterval(fetchMarket, 15000);
setInterval(swapWeather, 3000);
setInterval(swapMarket, 3000);
</script>

</body>
</html>
