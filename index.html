<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">

<style>
html, body { margin:0; padding:0; background:transparent; height:100%; }

.safe {
  width:100%; height:100%;
  padding:4vh 4vw;
  box-sizing:border-box;
  display:flex; justify-content:center; align-items:center;
}

.container { width:100%; max-width:900px; height:90px; }

.card {
  width:100%; height:100%;
  border-radius:22px;
  position:relative; overflow:hidden;
  background:linear-gradient(180deg, rgba(20,20,25,0.9), rgba(10,10,12,0.95));
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -10px 20px rgba(0,0,0,0.6),
    0 10px 30px rgba(0,0,0,0.6);
}

.card::before {
  content:""; position:absolute; bottom:-6px; left:10%;
  width:80%; height:20px;
  background:radial-gradient(ellipse at center, rgba(255,120,0,0.95), rgba(255,120,0,0.45) 40%, transparent 70%);
  filter:blur(12px);
}

.card::after {
  content:""; position:absolute; bottom:0; left:5%;
  width:90%; height:3px;
  border-radius:20px;
  background:linear-gradient(90deg,transparent,#ff7a00,#ffb347,#ff7a00,transparent);
}

/* TEXTO */
.title {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:#ff8c00;
  transition:.4s;
}

.audiowide { font-family:'Audiowide'; font-size:24px; }
.roboto { font-family:'Roboto'; }
.small { font-size:18px; }

.weather {
  position:absolute; left:20px; top:50%;
  transform:translateY(-50%);
  font-family:'Roboto'; font-size:14px; color:#ccc;
  transition:.3s;
}
.weather.hide { opacity:0; }

.right {
  position:absolute; right:20px; top:50%;
  transform:translateY(-50%);
  font-family:'Roboto'; font-size:14px; color:#aaa;
  transition:.3s;
}
.right.hide { opacity:0; }

/* glitch suave */
.glitch { position:relative; }
.glitch::before,.glitch::after {
  content:"CURU"; position:absolute; left:0; opacity:.5;
}
.glitch::before { color:#ff3c00; transform:translate(1px,-1px); }
.glitch::after { color:#00ffff; transform:translate(-1px,1px); }
</style>
</head>

<body>

<div class="safe">
  <div class="container">
    <div class="card">

      <div id="text" class="title audiowide">LIVEPX NA BIO</div>
      <div id="weather" class="weather">São Paulo 25°C</div>
      <div id="right" class="right">--:--</div>

    </div>
  </div>
</div>

<script>
const API_KEY = "46f49c9551bea5305c63071f37f9622d";

/* ================= FALLBACK STATE ================= */
let lastWeather = ["São Paulo 25°C"];
let lastMarket = "BTC 300K • ETH 15K";

/* ================= SCRAMBLE ================= */
function scramble(el, text){
  const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890";
  let frame=0;

  function run(){
    let out="";
    for(let i=0;i<text.length;i++){
      out += i<frame ? text[i] : chars[Math.floor(Math.random()*chars.length)];
    }
    el.innerText=out;

    if(frame<=text.length){
      frame+=0.2;
      requestAnimationFrame(run);
    } else {
      el.innerText=text;
    }
  }
  run();
}

/* ================= TEXTO ================= */
const textEl=document.getElementById("text");

const texts=[
  {html:"LIVEPX NA BIO",class:"audiowide",scramble:true},
  {html:'cupom <span class="glitch">CURU</span> na tradeit.gg te dá descontos',class:"roboto small"}
];

let ti=0;

setInterval(()=>{
  textEl.classList.add("fade-out");

  setTimeout(()=>{
    ti=(ti+1)%texts.length;
    textEl.className="title "+texts[ti].class;
    textEl.innerHTML=texts[ti].html;
    textEl.classList.remove("fade-out");

    if(texts[ti].scramble){
      scramble(textEl,"LIVEPX NA BIO");
    }
  },400);

},6000);

scramble(textEl,"LIVEPX NA BIO");

/* ================= CLIMA COM FALLBACK ================= */
const weatherEl=document.getElementById("weather");
const cities=["Sao Paulo,BR","Rio de Janeiro,BR","Belo Horizonte,BR"];
let wi=0;

async function loadWeather(){
  let tempData=[];

  for(const c of cities){
    try{
      const r=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${c}&units=metric&appid=${API_KEY}`);
      const d=await r.json();

      if(d?.main?.temp){
        tempData.push(`${d.name} ${Math.round(d.main.temp)}°C`);
      }
    }catch{}
  }

  if(tempData.length){
    lastWeather = tempData; // atualiza só se válido
  }
}

setInterval(()=>{
  if(lastWeather.length){
    wi=(wi+1)%lastWeather.length;
    weatherEl.classList.add("hide");

    setTimeout(()=>{
      weatherEl.innerText=lastWeather[wi];
      weatherEl.classList.remove("hide");
    },200);
  }
},4000);

/* ================= MERCADO COM FALLBACK ================= */
const rightEl=document.getElementById("right");
let showClock=true;

function formatValue(v){
  if(v>=1000) return (v/1000).toFixed(0)+"K";
  return v;
}

async function loadMarket(){
  try{
    const res=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=brl");
    const d=await res.json();

    if(d?.bitcoin?.brl && d?.ethereum?.brl){
      lastMarket = `BTC ${formatValue(d.bitcoin.brl)} • ETH ${formatValue(d.ethereum.brl)}`;
    }

  }catch{}
}

setInterval(()=>{
  rightEl.classList.add("hide");

  setTimeout(()=>{
    if(showClock){
      const now=new Date();
      rightEl.innerText=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    } else {
      rightEl.innerText=lastMarket; // fallback aqui
    }

    rightEl.classList.remove("hide");
    showClock=!showClock;

  },200);

},4000);

/* INIT */
loadWeather();
loadMarket();

setInterval(loadWeather,900000);
setInterval(loadMarket,1200000);
</script>

</body>
</html>
