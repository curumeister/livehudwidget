<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  background:transparent;
  height:100%;
}

.safe{
  width:100%;
  height:100%;
  padding:clamp(20px,4vh,50px) clamp(20px,4vw,50px);
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.bar{
  width:fit-content;
  max-width:700px;
  height:60px;

  background:#ff7a00;
  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center; /* 🔥 CORRIGIDO */

  padding:0 16px;
  gap:22px;

  box-shadow:0 6px 18px rgba(0,0,0,0.3);
  margin-top:clamp(8px,2vh,20px);
}

/* 🔥 DIVISORES GRADIENTE (FUNCIONANDO ENTRE TODOS) */
.bar > div{
  display:flex;
  align-items:center;
}

.bar > div:not(:last-child){
  position:relative;
  padding-right:18px;
  margin-right:18px;
}

.bar > div:not(:last-child)::after{
  content:"";
  position:absolute;
  right:0;
  top:50%;
  transform:translateY(-50%);

  width:1px;
  height:32px;

  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0),
    rgba(0,0,0,0.28),
    rgba(0,0,0,0)
  );
}

/* CLIMA */
.weather{
  gap:6px;
}

.icon{
  width:16px;
  height:16px;
  stroke:#000;
  stroke-width:2;
  fill:none;
}

.temp{
  font-size:16px;
  font-weight:700;
}

/* MERCADO */
.market{
  gap:12px;
  font-variant-numeric: tabular-nums;
}

.market span{
  font-size:12px;
}

/* RELÓGIO */
.clock{
  font-family:'JetBrains Mono', monospace;
  gap:4px;
}

.time{
  font-size:20px;
}

.sec{
  font-size:10px;
  opacity:.6;
}

*{color:#000;font-family:'Roboto';}
</style>
</head>

<body>

<div class="safe">
  <div class="bar">

    <!-- CLIMA -->
    <div class="weather">
      <svg id="weatherIcon" class="icon" viewBox="0 0 24 24"></svg>
      <span class="temp" id="temp">--°</span>
    </div>

    <!-- MERCADO -->
    <div class="market">
      <span id="btc">BTC --</span>
      <span id="eth">ETH --</span>
      <span id="usd">USD --</span>
    </div>

    <!-- RELÓGIO -->
    <div class="clock">
      <span class="time" id="time">--:--</span>
      <span class="sec" id="sec">--</span>
    </div>

  </div>
</div>

<script>
const API_KEY="46f49c9551bea5305c63071f37f9622d";

/* ICON */
function getIcon(code){
  if(code.startsWith("01")) return '<circle cx="12" cy="12" r="4"/>';
  if(code.startsWith("02")) return '<circle cx="10" cy="10" r="4"/><path d="M14 14h6"/>';
  return '<rect x="5" y="10" width="14" height="5" rx="2"/>';
}

/* CLIMA */
async function loadWeather(){
  try{
    const r=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Sao Paulo,BR&units=metric&appid=${API_KEY}&lang=pt_br`);
    const d=await r.json();
    if(d.cod !== 200) return;

    temp.innerText=Math.round(d.main.temp)+"°";
    weatherIcon.innerHTML=getIcon(d.weather[0].icon);

  }catch(e){
    console.error("Erro clima:", e);
  }
}

/* MERCADO */
function format(v){
  if(v>1000) return (v/1000).toFixed(0)+"K";
  return v;
}

async function loadMarket(){
  try{
    const c=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=brl");
    const cd=await c.json();

    const fx=await fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL");
    const fd=await fx.json();

    btc.innerText="BTC "+format(cd.bitcoin.brl);
    eth.innerText="ETH "+format(cd.ethereum.brl);
    usd.innerText="USD "+parseFloat(fd.USDBRL.bid).toFixed(2);

  }catch(e){
    console.error("Erro mercado:", e);
  }
}

/* CLOCK */
function updateClock(){
  const now=new Date();
  time.innerText=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  sec.innerText=now.getSeconds().toString().padStart(2,"0");
}

/* INIT */
loadWeather();
loadMarket();
updateClock();

setInterval(updateClock,1000);
setInterval(loadWeather,30000);
setInterval(loadMarket,60000);
</script>

</body>
</html>
