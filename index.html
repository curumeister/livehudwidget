<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Inter', sans-serif;
}

.container {
  width: 300px;
  height: 300px;
  margin: 10px auto;
}

.card {
  width: 100%;
  height: 100%;
  border-radius: 24px;
  position: relative;
  padding: 20px;
  box-sizing: border-box;
  background: #0b0b0d;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 24px;
  padding: 2px;
  background: linear-gradient(135deg, #ff6a00, #ff2d55, #2BFFF9);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
}

.content {
  position: relative;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.label {
  font-size: 11px;
  color: #00D0A2;
}

.amount {
  font-size: 28px;
  color: #fff;
}

.user {
  font-size: 13px;
  color: #00D0A2;
}

.divider {
  height: 1px;
  background: rgba(255,255,255,0.08);
}

.meta-box {
  padding: 10px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  text-align: center;
  color: #fff;
}

.weather {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #ccc;
}

.city {
  text-align: center;
  width: 33%;
}

.city-name {
  font-size: 10px;
  color: #aaa;
}

.temp {
  color: #2BFFF9;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="content">

      <!-- DOAÇÃO -->
      <div>
        <div class="label">ÚLTIMA DOAÇÃO</div>
        <div id="amount" class="amount">R$ 0</div>
        <div id="user" class="user">—</div>
      </div>

      <div class="divider"></div>

      <!-- META DINÂMICA -->
      <div>
        <div class="label">META</div>
        <div id="metaBox" class="meta-box">Carregando...</div>
      </div>

      <div class="divider"></div>

      <!-- CLIMA -->
      <div class="weather">
        <div class="city" id="c1">
          <div class="city-name">São Paulo</div>
          <div class="temp">--</div>
        </div>

        <div class="city" id="c2">
          <div class="city-name">Belo Horizonte</div>
          <div class="temp">--</div>
        </div>

        <div class="city" id="c3">
          <div class="city-name">Rio de Janeiro</div>
          <div class="temp">--</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const API_KEY = "46f49c9551bea5305c63071f37f9622d";

function money(v){
  return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

async function load(){
  const res = await fetch("/overlay-data");
  const data = await res.json();

  if(data.lastDonate){
    document.getElementById("amount").innerText = money(data.lastDonate.amount);
    document.getElementById("user").innerText = "por " + data.lastDonate.name;
  }

  if(data.goal){
    const pct = Math.floor((data.goal.current/data.goal.target)*100);
    document.getElementById("metaBox").innerText =
      `${money(data.goal.current)} / ${money(data.goal.target)} • ${pct}%`;
  }
}

const cities = [
  {el:"c1",q:"Sao Paulo,BR"},
  {el:"c2",q:"Belo Horizonte,BR"},
  {el:"c3",q:"Rio de Janeiro,BR"}
];

async function loadWeather(){
  for(const c of cities){
    try{
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${c.q}&units=metric&appid=${API_KEY}`
      );
      const data = await res.json();
      document.querySelector(`#${c.el} .temp`).innerText =
        Math.round(data.main.temp)+"°C";
    }catch{}
  }
}

load();
setInterval(load,3000);

loadWeather();
setInterval(loadWeather,600000);
</script>

</body>
</html>
