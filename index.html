<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Inter', sans-serif;
}

/* SAFE AREA */
body {
  padding: 16px;
  box-sizing: border-box;

  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 760px;
  height: 90px;
}

/* CARD */
.card {
  width: 100%;
  height: 100%;
  border-radius: 16px;
  padding: 12px 16px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  background: linear-gradient(145deg, #0a0a0c, #121214);

  border: 1px solid rgba(255,140,0,0.25);

  box-shadow:
    0 0 20px rgba(255,140,0,0.10),
    inset 0 0 10px rgba(255,140,0,0.04);
}

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* BLOCO */
.block {
  display: flex;
  flex-direction: column;
}

/* LABEL */
.label {
  font-size: 10px;
  color: #777;
  margin-bottom: 3px;
}

/* VALOR */
.amount {
  font-size: 22px;
  color: #fff;
  font-weight: 600;
}

.user {
  font-size: 11px;
  color: #ff8c00;
}

/* META */
.meta {
  text-align: right;
}

.meta-line {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
}

.meta-value {
  font-size: 16px;
  color: #fff;
}

.meta-target {
  font-size: 11px;
  color: #aaa;
}

.percent {
  padding: 3px 8px;
  border-radius: 20px;
  background: rgba(255,140,0,0.15);
  color: #ff8c00;
  font-size: 11px;
}

/* BARRA */
.bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 20px;
  overflow: hidden;
}

/* PROGRESSO */
.fill {
  height: 100%;
  width: 0%;
  position: relative;

  background: linear-gradient(90deg, #ff7a00, #ffb347);

  box-shadow: 0 0 10px rgba(255,140,0,0.5);

  overflow: hidden;
  transition: width 0.4s ease;
}

/* LUZ GROSSA */
.fill::after {
  content: "";
  position: absolute;
  top: -100%;
  left: -60%;
  width: 60%;
  height: 300%;

  background: linear-gradient(
    110deg,
    transparent,
    rgba(255,255,255,0.9),
    rgba(255,255,255,0.6),
    transparent
  );

  filter: blur(4px);
  transform: rotate(25deg);

  animation: shineMove 2s linear infinite;
}

@keyframes shineMove {
  0% { left: -60%; }
  100% { left: 120%; }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="row">

      <div class="block">
        <div class="label">ÚLTIMA DOAÇÃO</div>
        <div id="amount" class="amount">R$ 0</div>
        <div id="user" class="user">—</div>
      </div>

      <div class="block meta">
        <!-- 🔥 ALTERADO AQUI -->
        <div class="label">2º Monitor</div>

        <div class="meta-line">
          <span id="metaValue" class="meta-value">R$ 0</span>
          <span class="meta-target">/ <span id="metaTarget">R$ 0</span></span>
          <span id="percent" class="percent">0%</span>
        </div>
      </div>

    </div>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>

  </div>
</div>

<script>
function money(v){
  return v.toLocaleString('pt-BR',{
    style:'currency',
    currency:'BRL'
  });
}

async function load(){
  const res = await fetch("/overlay-data");
  const data = await res.json();

  if(data.lastDonate){
    document.getElementById("amount").innerText =
      money(data.lastDonate.amount);

    document.getElementById("user").innerText =
      "por " + data.lastDonate.name;
  }

  if(data.goal){
    const current = data.goal.current;
    const target = data.goal.target;

    const pct = Math.min(Math.floor((current / target) * 100), 100);

    document.getElementById("metaValue").innerText = money(current);
    document.getElementById("metaTarget").innerText = money(target);
    document.getElementById("percent").innerText = pct + "%";

    document.getElementById("fill").style.width = pct + "%";
  }
}

load();
setInterval(load, 3000);
</script>

</body>
</html>
