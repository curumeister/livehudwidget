<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<!-- 🔒 carregamento mais confiável da fonte -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Orbitron', monospace; /* fallback sólido */
}

/* SAFE AREA */
body {
  padding: 16px;
  box-sizing: border-box;

  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 760px;
  height: 110px;
}

/* CARD */
.card {
  position: relative;

  width: 100%;
  height: 100%;
  border-radius: 16px;
  padding: 18px 16px 12px 16px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  background:
    radial-gradient(120% 140% at 15% 0%, rgba(255,255,255,0.10), transparent 60%),
    linear-gradient(180deg, #111113 0%, #0a0a0c 100%);

  border: 1px solid rgba(255,255,255,0.14);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(255,255,255,0.04),
    0 8px 25px rgba(0,0,0,0.8);
}

/* TOPO ROTATIVO */
.top-center {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 20px;
  overflow: hidden;
  text-align: center;
}

.rotating {
  position: absolute;
  width: 100%;
  left: 0;

  font-size: 16px;
  letter-spacing: 2px;
  color: #ff8c00;

  text-shadow:
    0 0 4px rgba(255,140,0,0.7),
    0 0 10px rgba(255,140,0,0.4);

  transition: transform 0.5s ease, opacity 0.5s ease;
}

.show { transform: translateX(0); opacity: 1; }
.left { transform: translateX(-100%); opacity: 0; }
.right { transform: translateX(100%); opacity: 0; }

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}

.block {
  display: flex;
  flex-direction: column;
}

/* NOME DO DOADOR (NEON) */
.donor {
  font-size: 12px;
  color: #ff8c00;
  margin-bottom: 4px;
  letter-spacing: 1px;

  text-shadow:
    0 0 5px rgba(255,140,0,0.8),
    0 0 10px rgba(255,140,0,0.5);
}

/* VALOR */
.amount {
  font-size: 26px;
  color: #fff;
  font-weight: 600;
}

/* META */
.meta {
  text-align: right;
}

.meta-line {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
}

.meta-value {
  font-size: 18px;
  color: #fff;
}

.meta-target {
  font-size: 12px;
  color: #aaa;
}

.percent {
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(255,140,0,0.15);
  color: #ff8c00;
  font-size: 12px;
}

/* 🔒 BARRA (confinando glow) */
.bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  overflow: hidden;
  position: relative; /* importante p/ confinar efeitos */
}

/* PROGRESSO */
.fill {
  height: 100%;
  width: 0%;
  position: relative;

  background: linear-gradient(90deg, #ff7a00, #ffb347);

  /* 🔧 glow reduzido (sem vazar) */
  box-shadow: 0 0 5px rgba(255,140,0,0.3);

  transition: width 0.4s ease;
}

/* 🔧 luz com blur reduzido */
.fill::after {
  content: "";
  position: absolute;
  top: -100%;
  left: -60%;
  width: 60%;
  height: 300%;

  background: linear-gradient(
    110deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );

  filter: blur(2px); /* reduz vazamento */
  transform: rotate(25deg);

  animation: shineMove 2s linear infinite;
}

@keyframes shineMove {
  0% { left: -60%; }
  100% { left: 120%; }
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <!-- TOPO -->
    <div class="top-center">
      <div id="textA" class="rotating show">2º MONITOR</div>
      <div id="textB" class="rotating right">LINKS NA BIO</div>
    </div>

    <div class="row">

      <div class="block">
        <div id="donor" class="donor">—</div>
        <div id="amount" class="amount">R$ 0</div>
      </div>

      <div class="block meta">
        <div class="meta-line">
          <span id="metaValue" class="meta-value">R$ 0</span>
          <span class="meta-target">/ <span id="metaTarget">R$ 0</span></span>
          <span id="percent" class="percent">0%</span>
        </div>
      </div>

    </div>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>

  </div>
</div>

<script>
function money(v){
  return v.toLocaleString('pt-BR',{
    style:'currency',
    currency:'BRL'
  });
}

/* slide lateral */
let showingA = true;
setInterval(()=>{
  const a = document.getElementById("textA");
  const b = document.getElementById("textB");

  if(showingA){
    a.className = "rotating left";
    b.className = "rotating show";
  } else {
    b.className = "rotating right";
    a.className = "rotating show";
  }
  showingA = !showingA;
}, 4000);

async function load(){
  const res = await fetch("/overlay-data");
  const data = await res.json();

  if(data.lastDonate){
    document.getElementById("amount").innerText =
      money(data.lastDonate.amount);

    document.getElementById("donor").innerText =
      data.lastDonate.name;
  }

  if(data.goal){
    const current = data.goal.current;
    const target = data.goal.target;

    const pct = Math.min(Math.floor((current / target) * 100), 100);

    document.getElementById("metaValue").innerText = money(current);
    document.getElementById("metaTarget").innerText = money(target);
    document.getElementById("percent").innerText = pct + "%";

    document.getElementById("fill").style.width = pct + "%";
  }
}

load();
setInterval(load, 3000);
</script>

</body>
</html>
