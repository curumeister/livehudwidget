<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body {
  margin:0;
  background:transparent;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* ===== WIDGET COMPACTO ===== */
.widget {
  width:300px;
  height:80px; /* menor */
  border-radius:18px;
  padding:12px 14px; /* menor */

  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background: rgba(15,15,15,0.55);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  isolation:isolate;
}

/* ===== BORDA GRADIENT CONTÍNUA ===== */
.widget::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:18px;
  padding:1.5px;

  background: linear-gradient(
    135deg,
    #ff7a00,
    #ff3c3c,
    #a855f7,
    #3b82f6,
    #ff7a00
  );

  background-size: 300% 300%;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;

  pointer-events:none;
}

/* glow externo */
.widget::after {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:20px;
  background: linear-gradient(
    135deg,
    rgba(255,120,0,0.4),
    rgba(255,60,60,0.4),
    rgba(168,85,247,0.4)
  );
  filter: blur(12px);
  opacity:0.5;
  z-index:-1;
}

/* COLUNAS */
.col {
  width:48%;
  position:relative;
  height:100%;
}

/* divisor mais sutil */
.divider {
  width:1px;
  height:50%;
  background:rgba(255,255,255,0.06);
}

/* STACK */
.stack {
  position:relative;
  height:100%;
  overflow:hidden;
}

/* ITEM */
.item {
  position:absolute;
  width:100%;
  left:0;
  top:10px;
  opacity:0;

  transition:
    top 0.7s cubic-bezier(.22,.61,.36,1),
    opacity 0.5s ease;
}

.item.active {
  top:0;
  opacity:1;
}

/* TEXTO MAIS COMPACTO */
.label {
  font-size:10px;
  color:rgba(255,255,255,0.45);
  letter-spacing:.5px;
}

.value {
  font-size:18px; /* menor */
  font-weight:600;
  color:#fff;
}
</style>
</head>

<body>

<div class="widget">

  <div class="col">
    <div class="stack">
      <div class="item active" id="wA">
        <div class="label">Clima</div>
        <div class="value">--°C</div>
      </div>
      <div class="item" id="wB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="col">
    <div class="stack">
      <div class="item active" id="mA">
        <div class="label">USD</div>
        <div class="value">R$ --</div>
      </div>
      <div class="item" id="mB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

</div>

const API_KEY = "SUA_KEY";

const formatBRL = n =>
  n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

/* restante do JS igual ao seu */
</script>

</body>
</html>
