<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

/* ===== CORREÇÃO GLOBAL ===== */
html, body {
  width:100%;
  height:100%;
  overflow:hidden; /* impede qualquer vazamento externo */
  background:transparent;
}

/* ===== WIDGET ===== */
.widget {
  width:340px;
  height:100px;
  border-radius:22px;
  padding:16px 20px;

  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:space-between;
  align-items:center;

  background: rgba(10,10,10,0.55);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.06);

  contain: layout paint; /* sandbox de render */
}

/* ===== BORDA HUD ===== */
.widget::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  padding:2px;

  background:
    linear-gradient(90deg, #ff5a00, #ff5a00) left top / 40% 2px no-repeat,
    linear-gradient(90deg, #ffffff, #ffffff) right top / 40% 2px no-repeat,
    linear-gradient(0deg, #ff5a00, #ff5a00) left bottom / 40% 2px no-repeat,
    linear-gradient(0deg, #ffffff, #ffffff) right bottom / 40% 2px no-repeat;

  pointer-events:none;
}

/* glow interno */
.widget::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  box-shadow:
    inset 0 0 25px rgba(255,90,0,0.15),
    inset 0 0 35px rgba(255,255,255,0.05);
  pointer-events:none;
}

/* COLUNAS */
.col {
  width:45%;
  position:relative;
  height:100%;
}

.divider {
  width:1px;
  height:60%;
  background:rgba(255,255,255,0.08);
}

/* ===== STACK FIX ===== */
.stack {
  position:relative;
  height:100%;
  overflow:hidden;
  isolation:isolate;
}

/* ===== ITEM (SEM TRANSFORM) ===== */
.item {
  position:absolute;
  width:100%;
  left:0;
  top:12px;

  opacity:0;

  transition:
    top 0.9s cubic-bezier(.22,.61,.36,1),
    opacity 0.6s ease;

  pointer-events:none;
}

.item.active {
  top:0;
  opacity:1;
  z-index:2;
}

/* TEXTO */
.label {
  font-size:11px;
  color:rgba(255,255,255,0.5);
  letter-spacing:.6px;
}

.value {
  font-size:20px;
  font-weight:600;
  color:#fff;
}
</style>
</head>

<body>

<div class="widget">

  <!-- CLIMA -->
  <div class="col">
    <div class="stack">
      <div class="item active" id="wA">
        <div class="label">Clima</div>
        <div class="value">--°C</div>
      </div>
      <div class="item" id="wB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- MERCADO -->
  <div class="col">
    <div class="stack">
      <div class="item active" id="mA">
        <div class="label">USD</div>
        <div class="value">R$ --</div>
      </div>
      <div class="item" id="mB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

</div>

<script>
const API_KEY = "46f49c9551bea5305c63071f37f9622d";

const formatBRL = n =>
  n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

async function retry(fn, r=2, d=1000){
  try { return await fn(); }
  catch(e){
    if(!r) throw e;
    await new Promise(res=>setTimeout(res,d));
    return retry(fn,r-1,d*2);
  }
}

function fixCityName(name){
  return name === "Sao Paulo" ? "São Paulo" : name;
}

/* WEATHER */
let weatherData = [];
let wi = 0;
let wToggle = true;

async function fetchWeather(){
  const cities = [
    { id: 3448439 },
    { id: 3470127 },
    { id: 3451190 },
    { id: 3450554 }
  ];

  const res = await Promise.all(
    cities.map(c =>
      fetch(`https://api.openweathermap.org/data/2.5/weather?id=${c.id}&units=metric&appid=${API_KEY}`)
        .then(r=>r.json())
    )
  );

  weatherData = res
    .filter(r => r && r.main && r.name)
    .map(r => ({
      label: fixCityName(r.name),
      value: r.main?.temp != null
        ? `${Math.round(r.main.temp)}°C`
        : "--°C"
    }));
}

/* MARKET */
let marketData = [];
let mi = 0;
let mToggle = true;

async function fetchMarket(){
  try {
    const fiat = await fetch("https://api.exchangerate.host/latest?base=BRL&symbols=USD,GBP")
      .then(r=>r.json());

    const usd = 1 / fiat.rates.USD;
    const gbp = 1 / fiat.rates.GBP;

    const cryptoSymbols = {
      ETH: "ETHBRL",
      MATIC: "MATICBRL"
    };

    const crypto = await Promise.all(
      Object.entries(cryptoSymbols).map(async ([label, symbol]) => {
        try {
          const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`).then(r=>r.json());
          return { label, value: formatBRL(+r.price) };
        } catch {
          return { label, value: "R$ --" };
        }
      })
    );

    marketData = [
      { label: "USD", value: formatBRL(usd) },
      { label: "GBP", value: formatBRL(gbp) },
      ...crypto
    ];

  } catch {
    marketData = [
      { label: "USD", value: "R$ --" },
      { label: "GBP", value: "R$ --" }
    ];
  }
}

/* SWAP */
function swapWeather(){
  if(!weatherData.length) return;

  wi = (wi+1)%weatherData.length;
  const next = weatherData[wi];

  const A=document.getElementById("wA");
  const B=document.getElementById("wB");

  const active = wToggle?A:B;
  const nextEl = wToggle?B:A;

  nextEl.style.zIndex = 2;
  active.style.zIndex = 1;

  nextEl.querySelector(".label").textContent = next.label;
  nextEl.querySelector(".value").textContent = next.value;

  nextEl.classList.add("active");
  active.classList.remove("active");

  wToggle=!wToggle;
}

function swapMarket(){
  if(!marketData.length) return;

  mi = (mi+1)%marketData.length;
  const next = marketData[mi];

  const A=document.getElementById("mA");
  const B=document.getElementById("mB");

  const active = mToggle?A:B;
  const nextEl = mToggle?B:A;

  nextEl.style.zIndex = 2;
  active.style.zIndex = 1;

  nextEl.querySelector(".label").textContent = next.label;
  nextEl.querySelector(".value").textContent = next.value;

  nextEl.classList.add("active");
  active.classList.remove("active");

  mToggle=!mToggle;
}

/* INIT */
async function init(){
  document.querySelector("#wA .value").textContent = "Carregando...";
  document.querySelector("#mA .value").textContent = "Carregando...";

  try { await retry(fetchWeather); } catch {}
  try { await retry(fetchMarket); } catch {}
}

init();

setInterval(fetchWeather, 900000);
setInterval(fetchMarket, 15000);

setInterval(swapWeather, 3000);
setInterval(swapMarket, 3000);
</script>

</body>
</html>
