```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }

body {
  height:100vh;
  background:#0a0a0a;
  display:flex;
  align-items:center;
  justify-content:center;
}

.widget {
  width:340px;
  height:100px;
  border-radius:22px;
  padding:16px 20px;
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background: linear-gradient(145deg, #111, #0b0b0b);
  border: 1px solid rgba(255,255,255,0.06);
}

.widget::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  padding:1px;
  background: linear-gradient(120deg,
    rgba(255,120,0,0.0),
    rgba(255,120,0,0.35),
    rgba(255,60,0,0.5),
    rgba(255,120,0,0.35),
    rgba(255,120,0,0.0)
  );
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
}

.widget::after {
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  background: radial-gradient(circle at 85% 50%, rgba(255,120,0,0.25), transparent 60%);
  opacity:0.6;
}

.col { width:45%; position:relative; height:100%; }

.divider {
  width:1px;
  height:60%;
  background:rgba(255,255,255,0.08);
}

.stack { position:relative; height:100%; }

.item {
  position:absolute;
  width:100%;
  opacity:0;
  transform:translateY(10px) scale(0.97);
  transition: all 0.9s cubic-bezier(.22,.61,.36,1);
}

.item.active {
  opacity:1;
  transform:translateY(0) scale(1);
}

.label {
  font-size:11px;
  color:rgba(255,255,255,0.45);
  letter-spacing:.6px;
}

.value {
  font-size:20px;
  font-weight:600;
  color:#fff;
}
</style>
</head>

<body>

<div class="widget">

  <div class="col">
    <div class="stack">
      <div class="item active" id="wA">
        <div class="label">Clima</div>
        <div class="value">--°C</div>
      </div>
      <div class="item" id="wB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="col">
    <div class="stack">
      <div class="item active" id="mA">
        <div class="label">USD</div>
        <div class="value">R$ --</div>
      </div>
      <div class="item" id="mB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

</div>

<script>
const API_KEY = "46f49c9551bea5305c63071f37f9622d";

const formatBRL = n =>
  n.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});

async function retry(fn, r=2, d=1000){
  try { return await fn(); }
  catch(e){
    if(!r) throw e;
    await new Promise(res=>setTimeout(res,d));
    return retry(fn,r-1,d*2);
  }
}

function fixCityName(name){
  return name === "Sao Paulo" ? "São Paulo" : name;
}

/* WEATHER */
let weatherData = [];
let wi = 0;
let wToggle = true;

async function fetchWeather(){
  const cities = [
    { id: 3448439 },
    { id: 3470127 },
    { id: 3451190 },
    { id: 3450554 }
  ];

  const res = await Promise.all(
    cities.map(c =>
      fetch(`https://api.openweathermap.org/data/2.5/weather?id=${c.id}&units=metric&appid=${API_KEY}`)
        .then(r=>r.json())
    )
  );

  weatherData = res
    .filter(r => r && r.main && r.name)
    .map(r => ({
      label: fixCityName(r.name),
      value: r.main?.temp != null
        ? `${Math.round(r.main.temp)}°C`
        : "--°C"
    }));
}

/* MARKET (FIAT + CRYPTO) */
let marketData = [];
let mi = 0;
let mToggle = true;

async function fetchMarket(){
  try {
    const fiat = await fetch("https://api.exchangerate.host/latest?base=BRL&symbols=USD,GBP")
      .then(r=>r.json());

    const usd = 1 / fiat.rates.USD;
    const gbp = 1 / fiat.rates.GBP;

    const cryptoSymbols = {
      ETH: "ETHBRL",
      MATIC: "MATICBRL"
    };

    const crypto = await Promise.all(
      Object.entries(cryptoSymbols).map(async ([label, symbol]) => {
        try {
          const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`).then(r=>r.json());
          return { label, value: formatBRL(+r.price) };
        } catch {
          return { label, value: "R$ --" };
        }
      })
    );

    marketData = [
      { label: "USD", value: formatBRL(usd) },
      { label: "GBP", value: formatBRL(gbp) },
      ...crypto
    ];

  } catch {
    marketData = [
      { label: "USD", value: "R$ --" },
      { label: "GBP", value: "R$ --" }
    ];
  }
}

/* SWAP */
function swapWeather(){
  if(!weatherData.length) return;

  wi = (wi+1)%weatherData.length;
  const next = weatherData[wi];

  const A=document.getElementById("wA");
  const B=document.getElementById("wB");

  const active = wToggle?A:B;
  const nextEl = wToggle?B:A;

  nextEl.querySelector(".label").textContent = next.label;
  nextEl.querySelector(".value").textContent = next.value;

  nextEl.classList.add("active");
  active.classList.remove("active");

  wToggle=!wToggle;
}

function swapMarket(){
  if(!marketData.length) return;

  mi = (mi+1)%marketData.length;
  const next = marketData[mi];

  const A=document.getElementById("mA");
  const B=document.getElementById("mB");

  const active = mToggle?A:B;
  const nextEl = mToggle?B:A;

  nextEl.querySelector(".label").textContent = next.label;
  nextEl.querySelector(".value").textContent = next.value;

  nextEl.classList.add("active");
  active.classList.remove("active");

  mToggle=!mToggle;
}

/* INIT */
async function init(){
  document.querySelector("#wA .value").textContent = "Carregando...";
  document.querySelector("#mA .value").textContent = "Carregando...";

  try { await retry(fetchWeather); } catch {}
  try { await retry(fetchMarket); } catch {}
}

init();

setInterval(fetchWeather, 900000);
setInterval(fetchMarket, 15000);

setInterval(swapWeather, 3000);
setInterval(swapMarket, 3000);
</script>

</body>
</html>
