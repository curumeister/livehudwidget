<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
html,body{
  margin:0;
  background:transparent;
  height:100%;
}

.safe{
  width:100%;
  height:100%;
  padding:clamp(28px,5vh,70px) clamp(24px,5vw,70px);
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

.bar{
  width:100%;
  max-width:1100px;
  height:96px;

  background:#ff7a00;
  border-radius:24px;

  display:flex;
  align-items:center;

  padding:0 26px;
  gap:18px;

  box-shadow:0 8px 24px rgba(0,0,0,0.35);
}

/* CLIMA */
.weather{
  width:200px;
  display:flex;
  flex-direction:column;
}

.weather-row{
  display:flex;
  align-items:center;
  gap:8px;
}

.icon{
  width:20px;
  height:20px;
  stroke:#000;
  stroke-width:2;
  fill:none;
}

.city{font-size:13px;}
.temp{font-size:26px;font-weight:700;}
.desc{font-size:12px;opacity:0.7;}

/* CENTRO */
.center{
  flex:1;
  text-align:center;
}

.title{
  font-family:'Audiowide';
  font-size:28px;
}

/* MERCADO */
.market{
  width:230px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:4px;
}

.market-row{
  display:flex;
  gap:6px;
  font-variant-numeric: tabular-nums;
}

.market-symbol{
  font-size:12px;
  opacity:0.7;
}

.market-value{
  font-size:15px;
  font-weight:600;
}

/* cores dinâmica */
.up{ color:#0a8f2f; }
.down{ color:#a30000; }

/* RELÓGIO */
.clock{
  width:200px;
  text-align:right;
  font-family:'JetBrains Mono', monospace;
}

.day{font-size:12px;}
.time{font-size:34px;}
.sec{font-size:13px;opacity:0.6;}
.date{font-size:12px;opacity:0.7;}

*{color:#000;font-family:'Roboto';}

/* TRANSIÇÃO SUAVE */
.fade{
  transition:opacity .3s ease, transform .3s ease;
}
.fade.out{
  opacity:0;
  transform:translateY(-6px);
}
</style>
</head>

<body>

<div class="safe">
  <div class="bar">

    <!-- CLIMA -->
    <div class="weather">
      <div class="weather-row">
        <svg id="weatherIcon" class="icon" viewBox="0 0 24 24"></svg>
        <div class="city" id="city">--</div>
      </div>
      <div class="temp fade" id="temp">--°C</div>
      <div class="desc fade" id="desc">--</div>
    </div>

    <!-- CENTRO -->
    <div class="center">
      <div class="title">LIVEPX NA BIO</div>
    </div>

    <!-- MERCADO -->
    <div class="market" id="market"></div>

    <!-- RELÓGIO -->
    <div class="clock">
      <div class="day" id="day">--</div>
      <div>
        <span class="time" id="time">--:--</span>
        <span class="sec" id="sec">--</span>
      </div>
      <div class="date" id="date">--</div>
    </div>

  </div>
</div>

<script>
const API_KEY="46f49c9551bea5305c63071f37f9622d";

/* ===== CLIMA ROTATIVO ===== */
const cities=["Sao Paulo,BR","Rio de Janeiro,BR","Belo Horizonte,BR","Curitiba,BR"];
let ci=0;

function getIcon(code){
  if(code.startsWith("01")) return '<circle cx="12" cy="12" r="4"/>';
  if(code.startsWith("02")) return '<circle cx="10" cy="10" r="4"/><path d="M14 14h6"/>';
  if(code.startsWith("03")||code.startsWith("04")) return '<rect x="5" y="10" width="14" height="5" rx="2"/>';
  if(code.startsWith("09")||code.startsWith("10")) return '<path d="M6 14l2 4m4-4l2 4m4-4l2 4"/>';
  return '<circle cx="12" cy="12" r="4"/>';
}

async function loadWeather(){
  try{
    const r=await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cities[ci]}&units=metric&appid=${API_KEY}&lang=pt_br`);
    const d=await r.json();

    city.innerText=d.name;
    temp.innerText=Math.round(d.main.temp)+"°C";
    desc.innerText=d.weather[0].description;

    weatherIcon.innerHTML=getIcon(d.weather[0].icon);

  }catch{}

  ci=(ci+1)%cities.length;
}

/* ===== MERCADO ===== */
let prev={btc:null,eth:null};

function format(v){
  if(v>1000) return (v/1000).toFixed(0)+"K";
  return v;
}

async function loadMarket(){
  try{
    const c=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=brl");
    const cd=await c.json();

    const fx=await fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL");
    const fd=await fx.json();

    const btc=cd.bitcoin.brl;
    const eth=cd.ethereum.brl;

    const btcClass=prev.btc && btc>prev.btc ? "up" : "down";
    const ethClass=prev.eth && eth>prev.eth ? "up" : "down";

    prev.btc=btc;
    prev.eth=eth;

    market.innerHTML=`
      <div class="market-row ${btcClass}">
        <span class="market-symbol">BTC</span>
        <span class="market-value">R$ ${format(btc)}</span>
      </div>
      <div class="market-row ${ethClass}">
        <span class="market-symbol">ETH</span>
        <span class="market-value">R$ ${format(eth)}</span>
      </div>
      <div class="market-row">
        <span class="market-symbol">USD</span>
        <span class="market-value">R$ ${parseFloat(fd.USDBRL.bid).toFixed(2)}</span>
      </div>
    `;
  }catch{}
}

/* ===== RELÓGIO ===== */
function updateClock(){
  const now=new Date();

  time.innerText=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  sec.innerText=now.getSeconds().toString().padStart(2,"0");

  day.innerText=now.toLocaleDateString("pt-BR",{weekday:"long"});
  date.innerText=now.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric"});
}

/* INIT */
loadWeather();
loadMarket();
updateClock();

setInterval(updateClock,1000);
setInterval(loadWeather,6000);
setInterval(loadMarket,60000);
</script>

</body>
</html>
