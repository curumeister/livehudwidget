<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Orbitron', monospace;
}

body {
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  width: 100%;
  max-width: 760px;
  height: 110px;
}

.card {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  padding: 18px 16px 12px 16px;
  box-sizing: border-box;

  display: flex;
  flex-direction: column;
  justify-content: space-between;

  background:
    radial-gradient(120% 140% at 15% 0%, rgba(255,255,255,0.10), transparent 60%),
    linear-gradient(180deg, #111113 0%, #0a0a0c 100%);

  border: 1px solid rgba(255,255,255,0.14);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.08),
    inset 0 -1px 0 rgba(255,255,255,0.04),
    0 8px 25px rgba(0,0,0,0.8);
}

/* TOPO */
.top-center {
  position: absolute;
  top: 6px;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 420px;
  height: 20px;
  overflow: hidden;
  text-align: center;
}

.rotating {
  position: absolute;
  width: 100%;
  font-size: 16px;
  letter-spacing: 2px;
  color: #ff8c00;

  text-shadow:
    0 0 4px rgba(255,140,0,0.7),
    0 0 10px rgba(255,140,0,0.4);

  transition: transform 0.5s ease, opacity 0.5s ease;
}

.show { transform: translateX(0); opacity: 1; }
.left { transform: translateX(-100%); opacity: 0; }
.right { transform: translateX(100%); opacity: 0; }

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
}

.block {
  display: flex;
  flex-direction: column;
}

.donor {
  font-size: 12px;
  color: #ff8c00;
  margin-bottom: 4px;

  text-shadow:
    0 0 5px rgba(255,140,0,0.8),
    0 0 10px rgba(255,140,0,0.5);
}

.amount {
  font-size: 26px;
  color: #fff;
  font-weight: 600;
}

.meta-line {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: flex-end;
}

.meta-value { font-size: 18px; color: #fff; }
.meta-target { font-size: 12px; color: #aaa; }

.percent {
  padding: 4px 10px;
  border-radius: 20px;
  background: rgba(255,140,0,0.15);
  color: #ff8c00;
  font-size: 12px;
}

/* BARRA */
.bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff7a00, #ffb347);
  box-shadow: 0 0 5px rgba(255,140,0,0.3);
  transition: width 0.4s ease;
}

/* 🔥 ALERTA */
.alert {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  background: rgba(0,0,0,0.9);
  border: 1px solid rgba(255,140,0,0.3);
  padding: 12px 20px;
  border-radius: 12px;
  color: #ff8c00;
  font-size: 14px;
  opacity: 0;
  transition: all 0.3s ease;
  box-shadow: 0 0 20px rgba(255,140,0,0.3);
}

.alert.show {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="top-center">
      <div id="textA" class="rotating show">2º MONITOR</div>
      <div id="textB" class="rotating right">LINKS NA BIO</div>
    </div>

    <div class="row">
      <div class="block">
        <div id="donor" class="donor">—</div>
        <div id="amount" class="amount">R$ 0</div>
      </div>

      <div class="block meta">
        <div class="meta-line">
          <span id="metaValue" class="meta-value">R$ 0</span>
          <span class="meta-target">/ <span id="metaTarget">R$ 0</span></span>
          <span id="percent" class="percent">0%</span>
        </div>
      </div>
    </div>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>

  </div>
</div>

<!-- ALERT -->
<div id="alert" class="alert"></div>

<script>
function money(v){
  return v.toLocaleString('pt-BR',{
    style:'currency',
    currency:'BRL'
  });
}

/* ROTAÇÃO */
let showingA = true;
setInterval(()=>{
  const a = document.getElementById("textA");
  const b = document.getElementById("textB");

  if(showingA){
    a.className = "rotating left";
    b.className = "rotating show";
  } else {
    b.className = "rotating right";
    a.className = "rotating show";
  }

  showingA = !showingA;
}, 4000);

/* 🔥 DETECTOR */
let lastDonateId = null;

async function load(){
  const res = await fetch("/overlay-data");
  const data = await res.json();

  if(data.lastDonate){

    if(lastDonateId && lastDonateId !== data.lastDonate.id){
      showAlert(data.lastDonate);
    }

    lastDonateId = data.lastDonate.id;

    document.getElementById("amount").innerText =
      money(data.lastDonate.amount);

    document.getElementById("donor").innerText =
      data.lastDonate.name;
  }

  if(data.goal){
    const current = data.goal.current;
    const target = data.goal.target;

    const pct = Math.min(Math.floor((current / target) * 100), 100);

    document.getElementById("metaValue").innerText = money(current);
    document.getElementById("metaTarget").innerText = money(target);
    document.getElementById("percent").innerText = pct + "%";

    document.getElementById("fill").style.width = pct + "%";
  }
}

/* 🔥 ALERTA */
function showAlert(d){
  const el = document.getElementById("alert");

  el.innerText = `${d.name} doou ${money(d.amount)}`;
  el.classList.add("show");

  setTimeout(()=>{
    el.classList.remove("show");
  }, 3000);
}

load();
setInterval(load, 2000);
</script>

</body>
</html>
