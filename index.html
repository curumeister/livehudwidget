<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

/* WIDGET */
.widget {
  width: 320px;                /* um pouco mais largo (era 300px) */
  padding: 12px 16px;          /* mais respiro */
  border-radius: 16px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  background: rgba(20, 20, 20, 0.6);
  backdrop-filter: blur(10px);

  position: relative;
  overflow: hidden;
}

/* BORDA ANIMADA OTIMIZADA */
.widget::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 3px;
  background: linear-gradient(135deg, #ff7a00, #a855f7, #ff7a00);
  background-size: 200% 200%;
  animation: bordaAnimada 4s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  will-change: background-position;
}

@keyframes bordaAnimada {
  0% { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* COLUNAS */
.col {
  width: 47%;                  /* ligeiramente menos para caber divisor */
}

/* STACK */
.stack {
  position: relative;
  height: 32px;                /* um pouco maior para fonte maior */
}

/* ITEM */
.item {
  position: absolute;
  inset: 0;

  display: flex;
  justify-content: space-between;
  align-items: center;

  opacity: 0;
  transform: scale(0.9);
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
}

.item.active {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

/* TEXTO - LABEL (cidade / moeda) */
.label {
  font-size: 15px;             /* era 13px → agora 15px */
  font-weight: 600;            /* levemente mais encorpado */
  color: rgba(255, 255, 255, 0.9);  /* 90% de opacidade (era 0.6) */
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 65%;             /* garante espaço para o valor */
}

/* VALUE (temperatura / cotação) */
.value {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
}

/* divisor */
.divider {
  width: 1px;
  height: 24px;
  background: rgba(255, 255, 255, 0.15);
}
</style>
</head>

<body>

<div class="widget">

  <!-- CLIMA -->
  <div class="col">
    <div class="stack">
      <div class="item active" id="wA">
        <div class="label">Clima</div>
        <div class="value">--°C</div>
      </div>
      <div class="item" id="wB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- MERCADO -->
  <div class="col">
    <div class="stack">
      <div class="item active" id="mA">
        <div class="label">USD</div>
        <div class="value">R$ --</div>
      </div>
      <div class="item" id="mB">
        <div class="label"></div>
        <div class="value"></div>
      </div>
    </div>
  </div>

</div>

<script>
const API_KEY = "46f49c9551bea5305c63071f37f9622d";

/* FORMATAÇÃO COMPACTA */
const formatCurrencyCompact = (value) => {
  if (isNaN(value) || value === null) return "R$ --";
  const abs = Math.abs(value);
  if (abs < 1000) {
    return value.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
  } else if (abs < 1000000) {
    return `R$ ${(value / 1000).toFixed(1)}K`;
  } else if (abs < 1000000000) {
    return `R$ ${(value / 1000000).toFixed(1)}M`;
  } else {
    return `R$ ${(value / 1000000000).toFixed(1)}B`;
  }
};

/* CLIMA */
let weatherData = [];
let wi = 0;
let wToggle = true;

async function fetchWeather() {
  const cities = [
    { id: 3448439 }, // São Paulo
    { id: 3452925 }, // Rio de Janeiro
    { id: 3451190 }, // Belo Horizonte
    { id: 3450554 }, // Salvador
    { id: 3455775 }, // Palmas
    { id: 3662574 }, // Rio Branco
    { id: 3663517 }, // Manaus
    { id: 3465038 }  // Cuiabá
  ];

  const res = await Promise.all(
    cities.map(c =>
      fetch(`https://api.openweathermap.org/data/2.5/weather?id=${c.id}&units=metric&appid=${API_KEY}`)
        .then(r => r.json())
    )
  );

  weatherData = res.map(r => ({
    label: r.name,
    value: `${Math.round(r.main.temp)}°C`
  }));
}

/* MERCADO */
let marketData = [];
let mi = 0;
let mToggle = true;

async function fetchMarket() {
  try {
    const [usdRes, gbpRes, cnyRes] = await Promise.all([
      fetch("https://economia.awesomeapi.com.br/json/last/USD-BRL"),
      fetch("https://economia.awesomeapi.com.br/json/last/GBP-BRL"),
      fetch("https://economia.awesomeapi.com.br/json/last/CNY-BRL")
    ]);

    const usdJson = await usdRes.json();
    const gbpJson = await gbpRes.json();
    const cnyJson = await cnyRes.json();

    const usdBid = parseFloat(usdJson.USDBRL.bid);
    const gbpBid = parseFloat(gbpJson.GBPBRL.bid);
    const cnyBid = parseFloat(cnyJson.CNYBRL.bid);

    let ethValue = null, maticValue = null;
    try {
      const ethRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=ETHBRL");
      const ethJson = await ethRes.json();
      ethValue = parseFloat(ethJson.price);
    } catch {}
    try {
      const maticRes = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=MATICBRL");
      const maticJson = await maticRes.json();
      maticValue = parseFloat(maticJson.price);
    } catch {}

    marketData = [
      { label: "USD", value: formatCurrencyCompact(usdBid) },
      { label: "GBP", value: formatCurrencyCompact(gbpBid) },
      { label: "CNY", value: formatCurrencyCompact(cnyBid) },
      { label: "ETH", value: ethValue ? formatCurrencyCompact(ethValue) : "R$ --" },
      { label: "MATIC", value: maticValue ? formatCurrencyCompact(maticValue) : "R$ --" }
    ];
  } catch {
    marketData = [
      { label: "USD", value: "R$ --" },
      { label: "GBP", value: "R$ --" },
      { label: "CNY", value: "R$ --" },
      { label: "ETH", value: "R$ --" },
      { label: "MATIC", value: "R$ --" }
    ];
  }
}

/* TROCA SUAVE */
function smoothSwap(elementA, elementB, nextData, toggle) {
  const activeEl = toggle ? elementA : elementB;
  const nextEl = toggle ? elementB : elementA;

  nextEl.querySelector(".label").textContent = nextData.label;
  nextEl.querySelector(".value").textContent = nextData.value;

  requestAnimationFrame(() => {
    activeEl.classList.remove("active");
    nextEl.classList.add("active");
  });
}

function swapWeather() {
  if (!weatherData.length) return;
  wi = (wi + 1) % weatherData.length;
  smoothSwap(
    document.getElementById("wA"),
    document.getElementById("wB"),
    weatherData[wi],
    wToggle
  );
  wToggle = !wToggle;
}

function swapMarket() {
  if (!marketData.length) return;
  mi = (mi + 1) % marketData.length;
  smoothSwap(
    document.getElementById("mA"),
    document.getElementById("mB"),
    marketData[mi],
    mToggle
  );
  mToggle = !mToggle;
}

/* INIT */
async function init() {
  await fetchWeather();
  await fetchMarket();
}

init();

setInterval(fetchWeather, 900000);
setInterval(fetchMarket, 60000);
setInterval(swapWeather, 3000);
setInterval(swapMarket, 3000);
</script>

</body>
</html>
