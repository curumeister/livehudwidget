<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: 'Ubuntu Mono', monospace;
}

.container {
  width: 420px;
  margin: 10px auto;
}

.card {
  padding: 10px 14px;
  border-radius: 12px;
  background: rgba(12,12,14,0.95);
  border: 1px solid rgba(255,0,60,0.25);
  box-shadow: 0 0 12px rgba(255,0,60,0.25);
}

.top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.last {
  font-size: 12px;
  color: #aaa;
}

.last strong {
  color: #fff;
}

.amount {
  font-size: 14px;
  font-weight: 700;
  color: #ff4d6d;
}

.goal-text {
  font-size: 11px;
  color: #888;
  margin-bottom: 5px;
  text-align: center;
}

.bar {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
}

.fill {
  height: 100%;
  width: 0%;
  background: #ff003c;
  border-radius: 10px;
  box-shadow: 0 0 8px rgba(255,0,60,0.6);
  transition: width 0.4s ease;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="top">
      <div id="last" class="last">Sem doações</div>
      <div id="amount" class="amount">R$ 0</div>
    </div>

    <div id="goalText" class="goal-text">0 / 500</div>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>

  </div>
</div>

<script>
const lastEl = document.getElementById("last");
const amountEl = document.getElementById("amount");
const goalTextEl = document.getElementById("goalText");
const fillEl = document.getElementById("fill");

async function load() {
  const res = await fetch("/overlay-data");
  const data = await res.json();

  if (data.lastDonate) {
    lastEl.innerHTML = `Último: <strong>${data.lastDonate.name}</strong>`;
    amountEl.innerText = `R$ ${data.lastDonate.amount}`;
  }

  if (data.goal) {
    goalTextEl.innerText = `${data.goal.current} / ${data.goal.target}`;
    const pct = Math.min((data.goal.current / data.goal.target) * 100, 100);
    fillEl.style.width = pct + "%";
  }
}

load();
setInterval(load, 3000);
</script>

</body>
</html>
